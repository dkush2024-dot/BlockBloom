version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/blockbloom
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      # Add other environment variables as needed or use an env_file
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
      - qdrant
    volumes:
      - ./backend/src:/app/src # Hot reload for development
    command: npm run dev

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
